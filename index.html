<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wait for it...</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: none;
        }

        #timer {
            color: #222; /* 初始颜色极暗 */
            font-size: 8rem;
            font-weight: 900;
            transition: all 0.2s;
            user-select: none;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #start-btn {
            padding: 20px 50px;
            background: transparent;
            border: 1px solid #333;
            color: #555;
            cursor: pointer;
            font-size: 1.2rem;
            letter-spacing: 2px;
            z-index: 101;
            font-family: inherit;
        }

        #start-btn:hover {
            color: #fff;
            border-color: #666;
        }

        #result {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
            z-index: 100;
        }

        #result img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .shake {
            animation: shake 0.1s infinite;
            color: #600 !important; /* 最后10秒变暗红 */
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, 2px); }
        }
    </style>
</head>
<body>

    <button id="start-btn">开始</button>
    <div id="timer" style="display:none;">60</div>

    <div id="result">
        <img id="gaze-image" src="" alt="Looking at you" />
    </div>

    <audio id="bg-audio" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/943/943-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const startBtn = document.getElementById('start-btn');
        const timerDisplay = document.getElementById('timer');
        const resultView = document.getElementById('result');
        const gazeImage = document.getElementById('gaze-image');
        const bgAudio = document.getElementById('bg-audio');

        let count = 60; 

        // 修复了这里的中文逗号
        const imagePool = [
            "https://images.pexels.com/photos/4449232/pexels-photo-4449232.jpeg",
            "https://images.pexels.com/photos/4660414/pexels-photo-4660414.jpeg",
            "https://images.pexels.com/photos/14075810/pexels-photo-14075810.jpeg",
            "https://images.pexels.com/photos/20001644/pexels-photo-20001644.jpeg",
            "https://images.pexels.com/photos/36292144/pexels-photo-36292144.jpeg",
            "https://images.pexels.com/photos/3660732/pexels-photo-3660732.jpeg",
            "https://images.pexels.com/photos/15064136/pexels-photo-15064136.jpeg",
            "https://images.pexels.com/photos/17763053/pexels-photo-17763053.jpeg",
            "https://images.pexels.com/photos/27733188/pexels-photo-27733188.jpeg",
            "https://images.pexels.com/photos/31066067/pexels-photo-31066067.jpeg",
            "https://images.pexels.com/photos/32717657/pexels-photo-32717657.jpeg",
            "https://images.pexels.com/photos/33450327/pexels-photo-33450327.jpeg",
            "https://images.pexels.com/photos/32119774/pexels-photo-32119774.jpeg",
            "https://images.pexels.com/photos/17960083/pexels-photo-17960083.jpeg",
            "https://images.pexels.com/photos/35394188/pexels-photo-35394188.jpeg"
        ];

        // 预加载随机一张图片，防止倒计时结束时白屏
        const preloadImage = () => {
            const randomIndex = Math.floor(Math.random() * imagePool.length);
            gazeImage.src = imagePool[randomIndex];
        };

        startBtn.addEventListener('click', () => {
            preloadImage(); // 点击时就开始后台加载图片
            startBtn.style.display = 'none';
            timerDisplay.style.display = 'block';
            
            bgAudio.volume = 0.05;
            bgAudio.play().catch(e => console.log("Audio play blocked"));

            const interval = setInterval(() => {
                count--;
                timerDisplay.innerText = count;

                // 声音线性变大
                let vol = 0.05 + ((60 - count) / 60) * 0.95;
                bgAudio.volume = Math.min(vol, 1);

                if (count <= 10 && count > 0) {
                    timerDisplay.classList.add('shake');
                }

                if (count <= 0) {
                    clearInterval(interval);
                    bgAudio.pause(); 
                    timerDisplay.style.display = 'none';
                    resultView.style.display = 'block';
                }
            }, 1000);
        });
    </script>
</body>
</html>
